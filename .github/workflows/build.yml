name: Build multi-arch image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      app_version: ${{ steps.env.outputs.APP_VERSION }}
      base_version: ${{ steps.env.outputs.BASE_VERSION }}
      base_hash: ${{ steps.env.outputs.BASE_HASH }}
      openssl_version: ${{ steps.env.outputs.OPENSSL_VERSION }}
      build_date: ${{ steps.env.outputs.BUILD_DATE }}
      vcs_ref: ${{ steps.env.outputs.VCS_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load build metadata
        id: env
        shell: bash
        run: |
          while IFS='=' read -r key value; do
            if [[ -n "$key" && ! "$key" =~ ^# ]]; then
              echo "$key=$value" >> "$GITHUB_OUTPUT"
            fi
          done < .env

          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "VCS_REF=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.platform }} digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.template
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            BASE_VERSION=${{ needs.metadata.outputs.base_version }}
            BASE_HASH=${{ needs.metadata.outputs.base_hash }}
            OPENSSL_VERSION=${{ needs.metadata.outputs.openssl_version }}
            APP_VERSION=${{ needs.metadata.outputs.app_version }}
            VCS_REF=${{ needs.metadata.outputs.vcs_ref }}
            BUILD_DATE=${{ needs.metadata.outputs.build_date }}

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs:
      - metadata
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest
        shell: bash
        working-directory: /tmp/digests
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools create \
            --tag "${image}:${{ needs.metadata.outputs.app_version }}" \
            --tag "${image}:latest" \
            $(printf "${image}@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.app_version }}"
